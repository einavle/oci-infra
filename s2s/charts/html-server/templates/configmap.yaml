apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "html-server.fullname" . }}
  labels:
    {{- include "html-server.labels" . | nindent 4 }}
data:
  nginx.conf: |
    server {
      listen 80;
      root /usr/share/nginx/html;
      index index.html;

      location /data.json {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
      }
    }

  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>{{ .Values.data.title }}</title>
      <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #2c3e50; color: white; }
      </style>
    </head>
    <body>
      <h1>{{ .Values.data.title }}</h1>
      <p>This is the <strong>html-server</strong>. It also exposes a JSON endpoint at <code>/data.json</code>.</p>
      <table>
        <tr><th>ID</th><th>Name</th><th>Value</th></tr>
        {{- range .Values.data.items }}
        <tr><td>{{ .id }}</td><td>{{ .name }}</td><td>{{ .value }}</td></tr>
        {{- end }}
      </table>
    </body>
    </html>

  data.json: |
    {
      "title": {{ .Values.data.title | quote }},
      "items": [
        {{- $last := sub (len .Values.data.items) 1 }}
        {{- range $i, $item := .Values.data.items }}
        { "id": {{ $item.id }}, "name": {{ $item.name | quote }}, "value": {{ $item.value }} }{{ if ne $i $last }},{{ end }}
        {{- end }}
      ]
    }

apiVersion: v1
kind: Service
metadata:
  name: {{ include "html-server.fullname" . }}
  labels:
    {{- include "html-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "html-server.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 80
      protocol: TCP
      name: http

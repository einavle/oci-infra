apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "client-service.fullname" . }}
  labels:
    {{- include "client-service.labels" . | nindent 4 }}
data:
  server.py: |
    import http.server
    import urllib.request
    import json
    import os

    DATA_URL = "http://" + os.environ["HTML_SERVER_HOST"] + ":" + os.environ["HTML_SERVER_PORT"] + os.environ["HTML_SERVER_DATA_PATH"]

    CSS = (
        "body{font-family:sans-serif;max-width:700px;margin:40px auto;padding:0 20px}"
        "h1{color:#16a085}"
        ".source{font-size:.85em;color:#888;margin-bottom:20px}"
        "table{width:100%;border-collapse:collapse}"
        "th,td{padding:10px;border:1px solid #ddd;text-align:left}"
        "th{background:#16a085;color:white}"
        ".error{color:red}"
    )

    def fetch_data():
        with urllib.request.urlopen(DATA_URL, timeout=5) as resp:
            return json.loads(resp.read())

    def render_table(data):
        rows = "".join(
            "<tr><td>" + str(item["id"]) + "</td><td>" + item["name"] + "</td><td>" + str(item["value"]) + "</td></tr>"
            for item in data.get("items", [])
        )
        return "<h2>" + data.get("title", "") + "</h2><table><tr><th>ID</th><th>Name</th><th>Value</th></tr>" + rows + "</table>"

    def build_page(body, status_note=""):
        return (
            "<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'>"
            "<title>Client Service</title><style>" + CSS + "</style></head><body>"
            "<h1>Client Service</h1>"
            "<p class='source'>Data fetched from: <code>" + DATA_URL + "</code></p>"
            + body +
            "</body></html>"
        ).encode()

    class Handler(http.server.BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            print(fmt % args)

        def do_GET(self):
            try:
                data = fetch_data()
                body = render_table(data)
                status = 200
            except Exception as exc:
                body = "<p class='error'>Failed to reach html-server: " + str(exc) + "</p>"
                status = 502

            page = build_page(body)
            self.send_response(status)
            self.send_header("Content-Type", "text/html; charset=utf-8")
            self.send_header("Content-Length", str(len(page)))
            self.end_headers()
            self.wfile.write(page)

    if __name__ == "__main__":
        port = int(os.environ.get("PORT", 8080))
        print("Listening on :" + str(port) + ", upstream=" + DATA_URL)
        http.server.HTTPServer(("", port), Handler).serve_forever()

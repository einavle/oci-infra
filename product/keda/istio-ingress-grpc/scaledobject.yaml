apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: istio-ingress-grpc
  namespace: istio-ingress-grpc
spec:
  scaleTargetRef:
    name: istio-ingress-grpc
  minReplicaCount: 1
  maxReplicaCount: 12
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.istio-system.svc:9090
        metricName: istio_ingress_grpc_bandwidth_bytes_per_second
        # Total inbound + outbound bytes/s through the istio-ingress-grpc gateway
        query: |
          sum(rate(istio_request_bytes_sum{source_workload="istio-ingress-grpc"}[1m]))
          + sum(rate(istio_response_bytes_sum{source_workload="istio-ingress-grpc"}[1m]))
        # Scale up one replica per 10 MB/s of bandwidth
        threshold: "10000000"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingress-private
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.29.1   # adjust to your Istio version
    helm:
      releaseName: istio-ingress-private
      values: |
        service:
          type: LoadBalancer
          annotations:
            service.beta.kubernetes.io/oci-load-balancer-internal: "true"
        labels:
          istio: ingress-private

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress-private

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-ingress-grpc
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: gateway
    targetRevision: 1.29.1   # adjust to your Istio version
    helm:
      releaseName: istio-ingress-grpc
      values: |
        service:
          type: LoadBalancer
        labels:
          istio: ingress-grpc

  destination:
    server: https://kubernetes.default.svc
    namespace: istio-ingress-grpc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
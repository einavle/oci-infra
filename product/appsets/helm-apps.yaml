apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: product-helm-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/einav.leyboshor/oci-infra.git
        revision: HEAD
        directories:
          - path: product/helm/*
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/einav.leyboshor/oci-infra.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

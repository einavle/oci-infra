apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "html-server.fullname" . }}
  labels:
    {{- include "html-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "html-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "html-server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
            - name: config
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: config
              mountPath: /usr/share/nginx/html/data.json
              subPath: data.json
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
          readinessProbe:
            httpGet:
              path: /data.json
              port: 80
      volumes:
        - name: config
          configMap:
            name: {{ include "html-server.fullname" . }}

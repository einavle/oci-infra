apiVersion: v1
kind: Service
metadata:
  name: {{ include "client-service.fullname" . }}
  labels:
    {{- include "client-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "client-service.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http

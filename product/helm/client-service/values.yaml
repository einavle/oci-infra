replicaCount: 1

image:
  repository: python
  tag: "3.11-slim"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Reference to the html-server — override if deployed under a different release name or namespace
htmlServer:
  host: "html-server.html-server.svc.cluster.local"
  port: 80
  dataPath: "/data.json"

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

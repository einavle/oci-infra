apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Release.Name }}-gateway
spec:
  selector:
    istio: ingress
  servers:
  - port:
      number: 443
      name: https
      protocol: HTTPS
    hosts:
      {{- range .Values.gateway.hosts }}
      - {{ . | quote }}
      {{- end }}
    tls:
      mode: SIMPLE
      credentialName: israel-takeaway-tls
  

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: app-srv-vs
spec:
  hosts:
  - app-srv-prod-il-jerusalem-1.happ-srv.svc.cluster.local
  http:

  # Canary route (only when Host matches)
  - match:
    - headers:
        host:
          exact: canary.einav.com
    route:
    - destination:
        host: app-srv-prod-il-jerusalem-1.happ-srv.svc.cluster.local
        subset: canary

  # Default route (everything else)
  - route:
    - destination:
        host: app-srv-prod-il-jerusalem-1.happ-srv.svc.cluster.local
        subset: stable

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: app-srv-dr
spec:
  host: app-srv-prod-il-jerusalem-1.happ-srv.svc.cluster.local
  subsets:
  - name: stable
    labels:
      version: stable
  - name: canary
    labels:
      version: canary